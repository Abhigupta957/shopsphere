<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | ShopSphere</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .error-page {
      min-height: 100vh;
      background: var(--gradient-hero);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(108,99,255,0.3), transparent 70%);
    }

    .error-content {
      text-align: center;
      color: white;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .error-number {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(162,155,254,0.8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: fadeInUp 0.8s ease;
    }

    .error-emoji {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    .error-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      margin-bottom: 14px;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    .error-message {
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 32px;
      animation: fadeInUp 0.8s ease 0.3s both;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease 0.4s both;
    }

    .error-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 32px;
      animation: fadeInUp 0.8s ease 0.5s both;
    }

    .error-links a {
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem;
      transition: color 0.2s;
    }

    .error-links a:hover {
      color: white;
    }

    .floating-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .shape-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
      animation: float 8s ease-in-out infinite;
    }

    .shape-2 {
      width: 200px;
      height: 200px;
      bottom: -80px;
      right: -80px;
      animation: float 6s ease-in-out infinite 2s;
    }

    .shape-3 {
      width: 120px;
      height: 120px;
      top: 40%;
      right: 10%;
      animation: float 7s ease-in-out infinite 1s;
    }
  </style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<main class="error-page" role="main">
  <div class="floating-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="error-content">
    <span class="error-emoji" aria-hidden="true">🔍</span>
    <div class="error-number" aria-label="Error 404">404</div>
    <h1 class="error-title">Oops! Page Not Found</h1>
    <p class="error-message">
      Looks like this page took a wrong turn and got lost in our warehouse. But don't worry — we have plenty of amazing products waiting for you!
    </p>
    <div class="error-actions">
      <a href="index.html" class="btn btn-primary btn-lg" style="background:white;color:var(--primary)">
        🏠 Back to Home
      </a>
      <a href="products.html" class="btn btn-secondary btn-lg" style="border-color:rgba(255,255,255,0.4);color:white">
        🛍️ Browse Products
      </a>
    </div>
    <nav class="error-links" aria-label="Quick links">
      <a href="cart.html">🛒 Cart</a>
      <a href="wishlist.html">❤️ Wishlist</a>
      <a href="contact.html">📧 Contact</a>
      <a href="login.html">👤 Sign In</a>
    </nav>

    <div style="margin-top:40px;padding:20px;background:rgba(255,255,255,0.1);border-radius:16px;backdrop-filter:blur(10px)">
      <p style="color:rgba(255,255,255,0.8);font-size:0.88rem;margin-bottom:12px">
        🔎 Try searching for what you need:
      </p>
      <div style="display:flex;gap:8px">
        <input type="text" placeholder="Search products..." style="flex:1;padding:10px 16px;border-radius:var(--border-radius);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;font-size:0.9rem;outline:none" id="error-search" onkeydown="if(event.key==='Enter'){window.location.href='products.html?search='+encodeURIComponent(this.value)}">
        <button onclick="var q=document.getElementById('error-search').value.trim();if(q){window.location.href='products.html?search='+encodeURIComponent(q)}" style="background:var(--primary);color:white;border:none;border-radius:var(--border-radius);padding:10px 20px;font-weight:600;cursor:pointer;transition:var(--transition)">Search</button>
      </div>
    </div>
  </div>
</main>

<style>
  input::placeholder { color: rgba(255,255,255,0.5); }
</style>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/app.js"></script>
</body>
</html>
